<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
  <title>JobPilot</title>
</head>
<body>
  <header class="head">
    <div class="logo">J</div>
    <div class="headtext">
      <div class="name">JobPilot</div>
      <div class="sub" id="conn"><span class="dot"></span>checking…</div>
    </div>
    <label class="switch" title="Turn JobPilot on/off on all pages">
      <input type="checkbox" id="power" checked />
      <span class="slider"></span>
    </label>
  </header>

  <div class="profile" id="profile">
    <div class="muted">Loading profile…</div>
  </div>

  <div class="actions" id="actions">
    <button class="btn primary big" id="fill">
      <span class="bi">⚡</span><span class="bt">Fill this form<small>one pass — you review &amp; submit</small></span>
    </button>

    <div class="grid">
      <button class="btn" id="answer"><span class="bi">✨</span><span class="bt">AI answers</span></button>
      <button class="btn" id="resume"><span class="bi">📎</span><span class="bt">Resume…</span></button>
      <button class="btn" id="cover"><span class="bi">📄</span><span class="bt">Cover letter</span></button>
      <button class="btn" id="save"><span class="bi">🔖</span><span class="bt">Save listing</span></button>
    </div>

    <button class="btn accent" id="tailor">
      <span class="bi">🧵</span><span class="bt">Tailor resume to this job<small>grabs the JD → AI copy in the builder</small></span>
    </button>
  </div>

  <!-- resume picker (hidden until 📎 Resume… is clicked) -->
  <div class="picker" id="picker" hidden>
    <div class="picker-head">
      <span>Which resume?</span>
      <button class="linkbtn" id="pickerClose">✕</button>
    </div>
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-foot">Manage in Dashboard → Resumes</div>
  </div>

  <div class="status" id="status"></div>
  <div class="report" id="report"></div>

  <footer class="foot">
    <button class="linkbtn" id="refresh">↻ Refresh profile</button>
    <span class="dotsep">·</span>
    <button class="linkbtn" id="opts">⚙ Options</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
