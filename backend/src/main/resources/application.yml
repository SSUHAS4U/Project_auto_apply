spring:
  application:
    name: jobpilot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobpilot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate must not validate/alter it. Validation
      # is too strict for Postgres array (text[]) and jsonb columns.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

jobpilot:
  api-token: ${JOBPILOT_API_TOKEN:dev-token}
  doc-key: ${JOBPILOT_DOC_KEY:}
  jwt:
    secret: ${JOBPILOT_JWT_SECRET:change-me-jobpilot-dev-jwt-secret}
    ttl-seconds: ${JOBPILOT_JWT_TTL_SECONDS:2592000}
  cors-origins: ${JOBPILOT_CORS_ORIGINS:http://localhost:5173}
  ingest-concurrency: ${JOBPILOT_INGEST_CONCURRENCY:3}
  resume-dir: ${JOBPILOT_RESUME_DIR:./uploads}
  mail:
    from: ${JOBPILOT_MAIL_FROM:}
    digest-to: ${JOBPILOT_MAIL_DIGEST_TO:}
    daily-limit: ${JOBPILOT_MAIL_DAILY_LIMIT:25}
    # Brevo transactional email over HTTPS — set this to bypass SMTP-port blocking
    # on Render/cloud hosts. When present it's used instead of SMTP.
    brevo-api-key: ${JOBPILOT_BREVO_API_KEY:}
    from-name: ${JOBPILOT_MAIL_FROM_NAME:JobPilot}
  digest:
    min-score: ${JOBPILOT_DIGEST_MIN_SCORE:60}
  schedule:
    daily-cron: ${JOBPILOT_DAILY_CRON:-}
    zone: ${JOBPILOT_DAILY_ZONE:Asia/Kolkata}
    ingest-cron: ${JOBPILOT_INGEST_CRON:0 0 7,14,20 * * *}
    ingest-times-utc: ${JOBPILOT_INGEST_TIMES_UTC:01:30,08:30,14:30}
    # Daily ATS-board discovery (health-check + auto-add new boards), before first ingest.
    discovery-cron: ${JOBPILOT_DISCOVERY_CRON:0 30 6 * * *}
    # Automated job scout (LinkedIn/Naukri/Indeed via free keyless APIs) — hourly, on the hour.
    scout-cron: ${JOBPILOT_SCOUT_CRON:0 0 * * * *}
    # Daily Auto Apply run (also gated on the dashboard pause toggle); "-" disables.
    auto-apply-cron: ${JOBPILOT_AUTO_APPLY_CRON:0 30 9 * * *}
  coverletter:
    provider: ${JOBPILOT_COVERLETTER_PROVIDER:template}
  ai:
    provider: ${JOBPILOT_AI_PROVIDER:template}
    daily-limit: ${JOBPILOT_AI_DAILY_LIMIT:0}   # 0 = unlimited (free Groq/Gemini self-limit)
  groq:
    api-key: ${JOBPILOT_GROQ_API_KEY:}
    model: ${JOBPILOT_GROQ_MODEL:llama-3.3-70b-versatile}
    fast-model: ${JOBPILOT_GROQ_FAST_MODEL:llama-3.1-8b-instant}
    url: ${JOBPILOT_GROQ_URL:https://api.groq.com/openai/v1/chat/completions}
    # Reserved output tokens per request. Free tier is 6000 tokens/min, and Groq counts
    # this reservation against that budget — so a big value 413s every call. Raise it if
    # you upgrade your Groq tier.
    max-tokens: ${JOBPILOT_GROQ_MAX_TOKENS:4000}
  ollama:
    url: ${JOBPILOT_OLLAMA_URL:http://localhost:11434}
    model: ${JOBPILOT_OLLAMA_MODEL:llama3.1}
    auth-header: ${JOBPILOT_OLLAMA_AUTH_HEADER:}
    auth-value: ${JOBPILOT_OLLAMA_AUTH_VALUE:}
  gemini:
    api-key: ${JOBPILOT_GEMINI_API_KEY:}
    model: ${JOBPILOT_GEMINI_MODEL:gemini-2.5-flash}
  adzuna:
    app-id: ${JOBPILOT_ADZUNA_APP_ID:}
    app-key: ${JOBPILOT_ADZUNA_APP_KEY:}
    country: ${JOBPILOT_ADZUNA_COUNTRY:in}
    where: ${JOBPILOT_ADZUNA_WHERE:India}
    queries: ${JOBPILOT_ADZUNA_QUERIES:java developer,backend engineer,frontend developer,full stack developer,software engineer,react developer,python developer}
  jooble:
    key: ${JOBPILOT_JOOBLE_KEY:}
    keywords: ${JOBPILOT_JOOBLE_KEYWORDS:java developer,software engineer fresher,backend developer,full stack developer,junior software engineer}
  careerjet:
    affid: ${JOBPILOT_CAREERJET_AFFID:}
    locale: ${JOBPILOT_CAREERJET_LOCALE:en_IN}
    where: ${JOBPILOT_CAREERJET_WHERE:India}
    queries: ${JOBPILOT_CAREERJET_QUERIES:software engineer,java developer,full stack developer,react developer,python developer,junior software engineer}
  indian-api:
    api-key: ${JOBPILOT_INDIANAPI_KEY:}
    url: ${JOBPILOT_INDIANAPI_URL:https://jobs.indianapi.in/jobs}
  ingest:
    # Skip listings scoring below this at ingest (only applies once the profile has skills).
    min-score: ${JOBPILOT_INGEST_MIN_SCORE:30}
  scout:
    min-score: ${JOBPILOT_SCOUT_MIN_SCORE:35}
    retention-days: ${JOBPILOT_SCOUT_RETENTION_DAYS:7}
  latex:
    # Free LaTeX compile service (texlive.net is the default; no key needed).
    compile-url: ${JOBPILOT_LATEX_COMPILE_URL:https://texlive.net/cgi-bin/latexcgi}
  cleanup:
    retention-days: ${JOBPILOT_RETENTION_DAYS:7}
    cron: ${JOBPILOT_CLEANUP_CRON:0 30 3 * * *}

logging:
  level:
    com.jobpilot: INFO
