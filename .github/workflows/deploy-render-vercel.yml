name: Deploy to Render & Vercel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend to Render
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Vercel
    # Uses the Vercel CLI (vercel@latest) instead of a version-pinned third-party
    # action, so it never breaks on "unable to resolve action @vXX" again.
    # NOTE: if your Vercel project is already linked to this GitHub repo in the Vercel
    # dashboard, Vercel auto-deploys on push and this job is just a redundant safety net.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy to Vercel
        working-directory: ./frontend
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  build-test:
    runs-on: ubuntu-latest
    name: Build & Test Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: |
          cd backend
          chmod +x mvnw && ./mvnw clean package -DskipTests

      - name: Upload jar to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/jobpilot-backend-*.jar
