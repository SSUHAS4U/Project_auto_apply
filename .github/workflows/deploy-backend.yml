name: Build & publish backend image

# Builds the Spring Boot backend into a Docker image on GitHub's free runners (the 1 GB
# VM is too small to build it) and publishes it to GitHub Container Registry. The VM then
# just pulls + runs this image. No secrets are baked in — they live in the VM's .env only.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/ssuhas4u/jobpilot-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # After the new image is published, SSH into the free GCP VM and roll it out.
  # Requires repo secrets: VM_HOST (the VM's external IP), VM_USER, VM_SSH_KEY (private key).
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out on the VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/jobpilot
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f
            echo "Deployed: $(sudo docker compose ps --format '{{.Name}} {{.Status}}')"
