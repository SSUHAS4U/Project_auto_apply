name: ingest

# BACKUP trigger only. The PRIMARY ingest is now a server-side scheduler in the backend
# (DailyScheduler, 3x/day) which is reliable as long as the instance is awake. GitHub
# Actions cron is best-effort and can be delayed/skipped, so this just adds redundancy.
# The backend's one-at-a-time guard prevents this from colliding with the server run.
# Repo secrets: BACKEND_URL and API_TOKEN (must match the backend's JOBPILOT_API_TOKEN).
on:
  schedule:
    - cron: '40 1 * * *'    # ~07:10 IST (10 min after the server run, as a catch-up)
    - cron: '40 8 * * *'    # ~14:10 IST
    - cron: '40 14 * * *'   # ~20:10 IST
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest (sync)
        run: |
          echo "Triggering ingest on $BACKEND_URL"
          ic=$(curl -sS -o /tmp/ingest.json -w "%{http_code}" \
            --retry 6 --retry-all-errors --retry-delay 20 --max-time 300 \
            -X POST "$BACKEND_URL/api/ingest/sync" -H "X-Api-Token: $API_TOKEN")
          echo "ingest HTTP $ic"; cat /tmp/ingest.json || true
          test "$ic" = "200"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
