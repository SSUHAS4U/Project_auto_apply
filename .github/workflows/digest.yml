name: digest

# Safety-net digest — runs 30 min AFTER the daily pipeline (which already includes
# digest internally). If the daily run succeeded, this will find 0 new jobs and
# skip sending. If the daily run failed, this ensures the digest email still goes out.
# Repo secrets required: BACKEND_URL, API_TOKEN.
on:
  schedule:
    - cron: '0 3 * * *'     # 03:00 UTC = 08:30 IST (30 min after daily.yml)
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/digest
        run: |
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            --retry 5 --retry-all-errors --retry-delay 15 --max-time 180 \
            -X POST "$BACKEND_URL/api/digest" \
            -H "X-Api-Token: $API_TOKEN")
          echo "HTTP $code"; cat /tmp/out.json || true
          test "$code" = "200"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
