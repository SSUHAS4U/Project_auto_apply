name: daily

# One scheduled call: fetch latest jobs + AI-curated top picks + digest email.
# Repo secrets required: BACKEND_URL, API_TOKEN.
on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC = 08:00 IST daily
  workflow_dispatch: {}

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/daily/run/sync
        run: |
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            --retry 5 --retry-all-errors --retry-delay 15 --max-time 240 \
            -X POST "$BACKEND_URL/api/daily/run/sync" \
            -H "X-Api-Token: $API_TOKEN")
          echo "HTTP $code"; cat /tmp/out.json || true
          test "$code" = "200"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
