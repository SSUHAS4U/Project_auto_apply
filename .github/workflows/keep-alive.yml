name: keep-alive

# Render's free tier sleeps after ~15 min idle. GitHub cron is best-effort and can be
# delayed several minutes, so a single ping per run isn't enough. Instead each run pings
# for ~12 minutes (every 45s), and we schedule every 10 min — so coverage is effectively
# continuous and the backend never sleeps (cron ingest + fast logins keep working).
#
# Belt-and-braces: for guaranteed uptime add a free external monitor (UptimeRobot /
# BetterStack / cron-job.org) hitting BACKEND_URL/health every 5 min.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep the backend warm (~12 min of pings)
        run: |
          end=$((SECONDS + 720))   # ~12 minutes
          n=0
          while [ $SECONDS -lt $end ]; do
            n=$((n+1))
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 --retry 2 "$BACKEND_URL/health" || echo "000")
            echo "ping #$n -> HTTP $code"
            sleep 45
          done
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
