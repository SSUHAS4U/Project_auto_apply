name: keep-alive

# Render's free tier sleeps after ~15 min idle (slow first request after).
# This pings /health every ~10 min to keep the backend warm.
# NOTE: GitHub cron is best-effort and can be delayed several minutes. For rock-solid
# uptime use a free external monitor (UptimeRobot/BetterStack) hitting BACKEND_URL/health.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -sS --max-time 60 --retry 3 "$BACKEND_URL/health" || true
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
