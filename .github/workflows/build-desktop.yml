name: Build JobPilot Desktop

# Builds the downloadable JobPilot Desktop app and publishes each binary to a GitHub
# Release as soon as it's built — the dashboard's "Download" button links to
# /releases/latest/download/<asset>.
#
# Each platform publishes independently, so a fast runner (Windows/Linux) makes the
# download live in a couple of minutes without waiting on the slower macOS queue.
#
# Trigger: push a tag like `desktop-v3` (or run manually from the Actions tab).

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            out: jobpilot-desktop-win-x64.exe
          - os: ubuntu-latest
            script: build:linux
            out: jobpilot-desktop-linux-x64
          - os: macos-14
            script: build:mac-arm64
            out: jobpilot-desktop-macos-arm64
    runs-on: ${{ matrix.os }}
    # A slow/failed platform never blocks the others — each publishes on its own.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install worker deps
        working-directory: worker
        run: npm install
      - name: Bundle + package executable
        working-directory: worker
        run: npm run ${{ matrix.script }}
      - name: Publish this binary to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: JobPilot Desktop ${{ github.ref_name }}
          body: |
            Download the app for your computer, open it, and paste the connect code from
            your JobPilot dashboard (Agent → Connect). Requires Google Chrome installed.

            - Windows: `jobpilot-desktop-win-x64.exe`
            - macOS (Apple Silicon): `jobpilot-desktop-macos-arm64`
            - Linux: `jobpilot-desktop-linux-x64`
          files: worker/dist/${{ matrix.out }}
          make_latest: true
