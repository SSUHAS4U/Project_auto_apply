name: Build JobPilot Desktop

# Builds the installable JobPilot desktop app (Electron) and publishes each installer to a
# GitHub Release, so the dashboard's "Download" button (/releases/latest/download/<asset>)
# always points at a real installer.
#
# The installer bundles the built dashboard + the automation worker, so end users just run
# it, sign in, and click Connect in the built-in terminal.
#
# Trigger: push a tag like `desktop-v4` (or run manually from the Actions tab).

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            out: JobPilot-Windows-Setup.exe
          - os: ubuntu-latest
            script: dist:linux
            out: JobPilot-Linux.AppImage
          - os: macos-14
            script: dist:mac
            out: JobPilot-macOS.dmg
    runs-on: ${{ matrix.os }}
    # A slow/failed platform never blocks the others — each publishes on its own.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1) Build the dashboard the app serves. (The backend URL is injected at runtime by the
      #    Electron shell from desktop.config.json, so no VITE_API_BASE is needed here.)
      - name: Build dashboard
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 2) Worker deps — bundled into the app as resources (Playwright drives system Chrome).
      - name: Install worker deps
        working-directory: worker
        run: npm install --omit=dev

      # 3) Point the app + worker at the production backend (secret, else the committed default).
      - name: Write backend config
        shell: bash
        run: |
          URL="${{ secrets.DESKTOP_BACKEND_URL }}"
          if [ -n "$URL" ]; then
            echo "{ \"backendUrl\": \"$URL\" }" > desktop/desktop.config.json
          fi

      # 4) Build the installer.
      - name: Install desktop deps
        working-directory: desktop
        run: npm install
      - name: Build installer
        working-directory: desktop
        run: npm run ${{ matrix.script }}

      - name: Publish installer to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: JobPilot ${{ github.ref_name }}
          body: |
            Install JobPilot, sign in with your account, and click **Connect** in the built-in
            terminal (next to Watch live). Requires Google Chrome installed.

            - Windows: `JobPilot-Windows-Setup.exe`  (unknown-publisher warning → More info → Run anyway)
            - macOS (Apple Silicon): `JobPilot-macOS.dmg`
            - Linux: `JobPilot-Linux.AppImage`  (`chmod +x` once, then run)
          files: desktop/dist/${{ matrix.out }}
          make_latest: true
